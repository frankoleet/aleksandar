<svg width="128" height="128" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield Outline -->
  <path d="M100 15 
           L30 45 
           V95 
           C30 140 60 170 100 185 
           C140 170 170 140 170 95 
           V45 
           Z" fill="none" stroke="#00FFFF" stroke-width="5" filter="url(#glow)"></path>

  <!-- Inner Lock Symbol -->
  <rect x="75" y="90" width="50" height="45" rx="8" fill="none" stroke="#00FFFF" stroke-width="4" filter="url(#glow)"></rect>

  <path d="M85 90 
           V75 
           C85 60 115 60 115 75 
           V90" fill="none" stroke="#00FFFF" stroke-width="4" filter="url(#glow)"></path>

</svg>